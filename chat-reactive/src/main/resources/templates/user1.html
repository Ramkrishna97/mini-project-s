<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>User 1 Chat</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .chat-container { width: 500px; border: 1px solid #ccc; padding: 20px; }
    .message {
      border: 1px solid #ddd;
      margin: 5px;
      padding: 10px;
      border-radius: 5px;
    }
    .sent { background-color: #e0f7fa; }
    .received { background-color: #fff3e0; }
  </style>
</head>
<body>
<h1>User 1 Chat Interface</h1>

<!-- Send Message Form -->
<form action="/send-message" method="post">
  <input type="hidden" name="sender" value="user1"/>
  <input type="hidden" name="receiver" value="user2"/>
  <label for="message">Message:</label>
  <textarea id="message" name="message" required></textarea><br/>
  <button type="submit">Send</button>
</form>

<!-- Messages Display -->
<div class="chat-container">
  <h2>Messages from User 2 (to User 1)</h2>
  <div th:each="message : ${messages}" class="message received">
    <span th:text="${message}"></span>
  </div>
</div>

<!-- Navigation -->
<a href="/user2">Go to User 2</a>
</body>
</html>
