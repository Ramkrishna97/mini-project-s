<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>User 2 – Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif; background: #f0f2f5;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px; min-height: 100vh;
    }
    h1 { color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: .9rem; margin-bottom: 16px; }
    #status {
      font-size: .8rem; padding: 4px 14px; border-radius: 20px;
      background: #fff3cd; color: #856404; margin-bottom: 16px;
    }
    #status.connected    { background: #d4edda; color: #155724; }
    #status.disconnected { background: #f8d7da; color: #721c24; }
    .chat-box {
      width: 100%; max-width: 560px; background: #fff;
      border-radius: 12px; box-shadow: 0 2px 16px #0001;
      display: flex; flex-direction: column; height: 520px; overflow: hidden;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .bubble {
      max-width: 75%; padding: 10px 14px; border-radius: 18px;
      font-size: .95rem; line-height: 1.4; word-break: break-word;
    }
    .bubble .meta { font-size: .72rem; color: #999; margin-top: 4px; }
    .sent {
      align-self: flex-end; background: #34a853; color: #fff;
      border-bottom-right-radius: 4px;
    }
    .sent .meta { color: #b7f5cb; text-align: right; }
    .received {
      align-self: flex-start; background: #f1f3f4; color: #222;
      border-bottom-left-radius: 4px;
    }
    .input-row {
      display: flex; gap: 8px; padding: 12px;
      border-top: 1px solid #eee; background: #fafafa;
    }
    textarea {
      flex: 1; padding: 10px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: .95rem; resize: none;
      height: 44px; font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #34a853; }
    .send-btn {
      padding: 0 20px; background: #34a853; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
      font-size: .95rem; transition: background .2s;
    }
    .send-btn:hover  { background: #188038; }
    .send-btn:disabled { background: #aaa; cursor: default; }
    .nav { margin-top: 16px; font-size: .9rem; }
    .nav a { color: #34a853; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<h1>User 2</h1>
<p class="subtitle">Chatting with User 1</p>
<div id="status">Connecting…</div>

<div class="chat-box">
  <div id="messages"></div>
  <div class="input-row">
    <textarea id="msgInput" placeholder="Type a message… (Enter to send)"></textarea>
    <button class="send-btn" id="sendBtn" disabled>Send</button>
  </div>
</div>

<div class="nav">
  <a href="/">← Home</a> &nbsp;|&nbsp; <a href="/user1">Switch to User 1</a>
</div>

<script th:inline="javascript">
  const SENDER   = 'user2';
  const RECEIVER = 'user1';

  const messagesDiv = document.getElementById('messages');
  const msgInput    = document.getElementById('msgInput');
  const sendBtn     = document.getElementById('sendBtn');
  const statusEl    = document.getElementById('status');

  let socket;

  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    socket = new WebSocket(`${protocol}://${location.host}/ws/${SENDER}`);

    socket.onopen = () => {
      statusEl.textContent = '🟢 Connected';
      statusEl.className   = 'connected';
      sendBtn.disabled     = false;
    };

    socket.onclose = () => {
      statusEl.textContent = '🔴 Disconnected — retrying in 3s…';
      statusEl.className   = 'disconnected';
      sendBtn.disabled     = true;
      setTimeout(connect, 3000);
    };

    socket.onerror = () => socket.close();

    socket.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        appendBubble(data.message, 'received', data.sender, data.timestamp);
      } catch (e) {
        console.error('Parse error', e);
      }
    };
  }

  connect();

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || socket.readyState !== WebSocket.OPEN) return;
    socket.send(JSON.stringify({ sender: SENDER, receiver: RECEIVER, message: text }));
    appendBubble(text, 'sent', 'You', new Date().toISOString());
    msgInput.value = '';
  }

  sendBtn.onclick = sendMessage;
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function appendBubble(text, type, label, isoTime) {
    const wrap = document.createElement('div');
    wrap.className = `bubble ${type}`;
    wrap.innerHTML =
            `<div>${escHtml(text)}</div>` +
            `<div class="meta">${escHtml(label)} · ${formatTime(isoTime)}</div>`;
    messagesDiv.appendChild(wrap);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatTime(iso) {
    try { return new Date(iso).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }
    catch { return ''; }
  }
</script>
</body>
</html>
