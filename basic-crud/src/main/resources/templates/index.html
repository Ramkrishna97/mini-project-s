<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- This meta tag sets the character encoding to UTF-8, ensuring correct display of special characters -->
    <title>Homepage</title> <!-- This defines the title of the webpage shown in the browser tab -->

    <!-- Link to external CSS stylesheet. The file 'style.css' contains styling rules for this HTML page -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Main container that holds the two-column layout using flexbox or similar (based on CSS) -->
<div class="container">

    <!-- LEFT SIDE: Form Section. This is a form for users to input and add new student details -->
    <section id="student-form-section">  <!-- Container section with ID for styling/JS targeting -->
        <h2 class="form-header">Add Student</h2>  <!-- Heading element for the form section -->

        <form action="/save-student" method="post" id="studentForm">  <!-- Form that submits data to '/save-student' endpoint via POST request -->
            Name: <input type="text" name="name" required>  <!-- Input field for student's name; 'required' enforces user fills this before submission -->
            <br>
            Age: <input type="number" name="age" required>  <!-- Input field for student's age; must be a number and is mandatory -->
            <br>

            <!-- Submit button that triggers form action when clicked. This sends the new student data to the server -->
            <button type="submit">Save</button>
        </form>
    </section>

    <!-- RIGHT SIDE: Student Data Table Section. Displays a list of existing students using Thymeleaf templating -->
    <section id="student-data-section">
        <h1 class="page-header">Student Details</h1>  <!-- Page header showing the title or main heading for this section -->

        <!-- Table with rows generated by Thymeleaf's 'th:each' attribute, which iterates over '${students}' in Java-based backend logic -->
        <table border="1" id="studentTable">  <!-- A table element with borders enabled and ID for styling/JS targeting -->
            <thead>
            <tr>  <!-- Table header row containing column titles -->
                <th>Id</th>
                <th>Name</th>
                <th>Age</th>
            </tr>
            </thead>
            <tbody>
            <!-- This part is dynamically generated by Thymeleaf (e.g., in a Spring Boot application). 'student : ${students}' iterates over each student object -->
            <tr th:each="student : ${students}">
                <td th:text="${student.id}">  <!-- Displays the ID of the student; text-only to prevent HTML injection, even though JS could parse it -->
                </td>
                <td th:text="${student.name}">  <!-- Shows the name field from each student object; similar to above for safety and clarity -->
                </td>
                <td th:text="${student.age}">  <!-- Displays the age from the student objects in a table cell -->
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
</body>
</html>
